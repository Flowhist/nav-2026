sim_chassis_sensor_pub:
  ros__parameters:
    map_frame: "map"
    base_frame: "base_link"
    initialpose_topic: "/initialpose"
    cmd_vel_topic: "/cmd_vel"
    plan_topic: "/plan"
    publish_rate_hz: 30.0
    use_cmd_vel: false
    follow_plan: true
    replan_pause_s: 0.20
    demo_linear_speed_mps: 0.5
    demo_angular_speed_rps: 0.65
    demo_waypoint_tolerance_m: 0.10
    demo_heading_slowdown_deg: 40.0
    sim_startup_anchor_enable: false
    sim_startup_anchor_trigger_deg: 35.0
    sim_startup_anchor_distance_m: 0.20
    x: 0.0
    y: 0.0
    yaw_deg: 0.0
