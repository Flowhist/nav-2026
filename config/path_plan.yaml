path_plan:
  ros__parameters:
    # ===== 话题与坐标系 =====
    # 地图输入（OccupancyGrid）
    map_topic: "/map"
    # 目标点输入（PoseStamped）
    goal_topic: "/goal_pose"
    # 规划结果输出（nav_msgs/Path）
    path_topic: "/plan"
    # 全局坐标系（通常是 map）
    map_frame: "map"
    # 机器人基座坐标系（通常是 base_link）
    base_frame: "base_link"
    # 规划频率(Hz)：提高到 5Hz，减小点目标后的等待感
    plan_rate_hz: 2.0

    # ===== 栅格判定与碰撞安全 =====
    # 占用阈值(0~100)：越小越保守（更多格子视为障碍）
    occupied_threshold: 65
    # 未知区域是否按障碍处理：true更安全，false更激进
    treat_unknown_as_occupied: true
    # 障碍额外安全边界(米)：减小一点，提高窄通道通过率
    inflation_radius_m: 0.1
    # 搜索扩展上限：越大越不易失败，但最坏耗时更长
    max_search_expansions: 200000
    # 到目标判定容差(米)：越小越精确
    goal_tolerance_m: 0.12
    # false: 终点姿态保持沿路径切线，避免仿真到点时瞬间跳成 goal 朝向
    align_final_pose_yaw_to_goal: false
    # 新 goal 到来时先发布空路径，让控制器立即停下等待新路径
    stop_on_new_goal_clear_path: true
    # 任意重规划触发时先清空当前路径，停车等待下一拍新路径
    stop_before_replan_clear_path: true

    # ===== 车体几何（与 URDF 对齐）=====
    # base_link 到车头最前端
    vehicle_front_m: 0.84
    # base_link 到车尾最后端
    vehicle_rear_m: 0.25
    # base_link 到车体左侧边缘
    vehicle_left_m: 0.45
    # base_link 到车体右侧边缘
    vehicle_right_m: 0.45
    # 在矩形车体外再加的安全边距
    vehicle_margin_m: 0.03
    # 足迹采样间距：适度放宽，换取更快的碰撞检测
    footprint_sample_step_m: 0.10

    # ===== 朝向离散与运动原语 =====
    # 航向离散数：16 -> 每格 22.5 度
    heading_bins: 16
    # 单步扩展长度(米)：步子稍大，加快搜索
    primitive_step_m: 0.24
    # 单步允许的航向变化（离散 bin 数）
    primitive_turn_bins: 1
    # 转弯代价倍率
    turn_cost_weight: 0.20

    # ===== 重规划与平滑 =====
    # 地图更新时是否触发重规划
    replan_on_map_update: false
    # 偏离路径触发重规划阈值(米)：越小越敏感
    replan_deviation_m: 0.25
    # 一次 shortcut 允许直连的最大长度(米)：越大折点更少
    smooth_max_segment_m: 2.0
    # 路径输出的最小姿态间隔
    path_pose_spacing_m: 0.10
    # Weighted A* 启发式权重（>=1）：越大通常越快，但路径最优性会下降
    heuristic_weight: 1.35
    # 启发式朝向代价权重（m/rad）：适度增大可减少无效摆头搜索
    heuristic_heading_weight: 0.10
