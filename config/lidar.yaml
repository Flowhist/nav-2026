# finav 统一雷达配置（建图/导航共用）
# 新雷达支持直接输出扇形扫描，因此不再经过额外的角度过滤节点。

lidar_ip: 192.168.1.111
frame_id: laser_frame
topic_name: /scan

is_ethernet: true
port_name: /dev/ttyUSB0
baud: 921600

scan_frequency: 15
scan_resolution: 1000

# 新雷达使用自身原生角度定义：
# 0° 在 +x，90° 在 +y，扫描范围直接为 -45° ~ 225°。
start_angle: -45
stop_angle: 225

range_min: 0.05
range_max: 25.0

filter_switch: 0
cluster_num: 10
broad_filter_num: 20
nor_switch: 1
is_reverse_postion: false
