# finav 统一雷达配置（建图/导航共用）
# 新雷达支持直接输出扇形扫描，因此不再经过额外的角度过滤节点。

lidar_ip: 192.168.1.111
frame_id: laser_frame
topic_name: /scan

is_ethernet: true
port_name: /dev/ttyUSB0
baud: 921600

scan_frequency: 15
scan_resolution: 1000

# H100 实机回包表明起始角度会被设备钳制到 -45 度。
# 因此设备侧使用 -45~225 的 270 度扇区，再通过 offset 对齐到车辆坐标系。
start_angle: -45
stop_angle: 225
offset_angle: -45

range_min: 0.05
range_max: 25.0

filter_switch: 0
cluster_num: 10
broad_filter_num: 20
nor_switch: 1
is_reverse_postion: false
